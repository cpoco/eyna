name: cleanup

on:
  workflow_dispatch:
    inputs:
      hours:
        description: "hours to keep"
        required: true
        default: 6
        type: number

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: "24.18"
      - run: |
          node .github/scripts/cleanup-runs.mts "${{ inputs.hours }}"
      - run: |
          node .github/scripts/cleanup-caches.mts "${{ inputs.hours }}"
