name: release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025-vs2026
            arch: x64
          - os: macos-26
            arch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
      - uses: actions/cache@v5
        with:
          key: cache-${{ runner.os }}-${{ matrix.arch }}-${{ github.sha }}
          restore-keys: |
            cache-${{ runner.os }}-${{ matrix.arch }}-
          path: |
            cache
      - run: |
          vcpkg version
      - run: |
          npm ci
      - run: |
          npm run setup-native
      - run: |
          npm run setup-electron
      - run: |
          npm run b
      - run: |
          npm run p
      - uses: softprops/action-gh-release@v3
        with:
          name: draft
          draft: true
          prerelease: true
          files: dist/*.tar.gz
